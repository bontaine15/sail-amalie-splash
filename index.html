<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sail Amalie</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: white;
      background: #061525;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 20, 40, 0.35), rgba(0, 20, 40, 0.55)),
        url("splash.png") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .content {
      max-width: 800px;
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      letter-spacing: 0.08em;
      margin: 0;
      text-transform: uppercase;
    }

    p {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .line {
      width: 120px;
      height: 2px;
      background: white;
      margin: 1.5rem auto;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="content">
      <h1>Sail Amalie</h1>
      <div class="line"></div>
      <p>Coming Soon</p>
    </div>
  </main>
</body>
</html>
