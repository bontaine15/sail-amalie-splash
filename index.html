<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sail Amalie</title>
  <meta property="og:title" content="Sail Amalie" />
  <meta property="og:description" content="Amalie, a 1985 Bristol 31.1 sailing out of Newport, RI." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sailamalie.com/" />
  <meta property="og:image" content="https://sailamalie.com/amalie-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Sail Amalie splash screen" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sail Amalie" />
  <meta name="twitter:description" content="Amalie, a 1985 Bristol 31.1 sailing out of Newport, RI." />
  <meta name="twitter:image" content="https://sailamalie.com/amalie-preview.png" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: white;
      background: #061525;
    }

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0, 20, 40, 0.35), rgba(0, 20, 40, 0.55)),
        url("splash.png") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .content {
      max-width: 800px;
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      letter-spacing: 0.08em;
      margin: 0;
      text-transform: uppercase;
    }

    p {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .line {
      width: 120px;
      height: 2px;
      background: white;
      margin: 1.5rem auto;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="content">
      <h1>Sail Amalie</h1>
      <div class="line"></div>
      <p>Coming Soon</p>
    </div>
  </main>
</body>
</html>
